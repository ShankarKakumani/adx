name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches script
        run: |
          script_version=$(grep '^ADX_VERSION=' bin/adx | cut -d'"' -f2)
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$script_version" != "$tag_version" ]; then
            echo "Version mismatch: script=$script_version tag=$tag_version"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/adx
            install.sh

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        if: env.TAP_TOKEN != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://github.com/ShankarKakumani/adx/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -fsSL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/ShankarKakumani/homebrew-adx.git /tmp/homebrew-adx
          cd /tmp/homebrew-adx

          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/adx.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/adx.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/adx.rb
          git commit -m "Update adx to v${VERSION}"
          git push
